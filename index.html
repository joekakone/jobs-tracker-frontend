<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs Tracker - Alerts</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-900 to-black text-white min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="w-full flex justify-center py-4 px-4">
    <ul class="flex flex-wrap justify-center gap-4 sm:gap-6 bg-white text-black rounded-full px-6 py-2 font-medium shadow-lg text-sm sm:text-base">
      <li><a href="index.html" class="hover:underline">Home</a></li>
      <li><a href="jobs.html" class="hover:underline">Jobs</a></li>
      <!-- <li><a href="companies.html" class="hover:underline">Companies</a></li> -->
      <li><a href="pricing.html" class="hover:underline">Pricing</a></li>
      <li><a href="blog.html" class="hover:underline">Blog</a></li>
      <li><a href="login.html" class="hover:underline">Login</a></li>
    </ul>
  </nav>

  <!-- Main content -->
  <main class="flex-grow flex flex-col items-center justify-center text-center px-4">
    <h1 class="text-4xl sm:text-6xl font-bold mb-6">Jobs <span class="text-indigo-400 ml-1">✦</span> Tracker</h1>

    <div class="flex flex-col sm:flex-row items-center w-full max-w-4xl bg-white rounded-3xl sm:rounded-full overflow-hidden shadow-lg">

      <input 
        type="text" 
        placeholder="Enter keywords..." 
        class="px-6 py-4 text-black w-full flex-1 focus:outline-none text-sm sm:text-base border-b sm:border-b-0 sm:border-r border-gray-200" 
      />

      <select 
        class="px-4 py-4 text-black w-full sm:w-auto bg-white focus:outline-none text-sm sm:text-base border-b sm:border-b-0 sm:border-r border-gray-200 cursor-pointer">
        <option value="">Type de poste</option>
        <option value="stage">Stage</option>
        <option value="cdd">CDD</option>
        <option value="cdi">CDI</option>
      </select>

      <select 
        class="px-4 py-4 text-black w-full sm:w-auto bg-white focus:outline-none text-sm sm:text-base cursor-pointer">
        <option value="">Secteur</option>
        <option value="rh">RH</option>
        <option value="sante">Santé</option>
        <option value="distribution">Distribution</option>
        <option value="agriculture">Agriculture</option>
      </select>

      <a href="results.html" 
        class="bg-indigo-600 text-white font-bold px-8 py-4 hover:bg-indigo-700 transition text-sm sm:text-base min-w-[120px] text-center">
        Search
      </a>

    </div>

    <!-- Slogan -->
    <p class="mt-8 text-gray-300 text-sm sm:text-lg">Never miss a job opportunity in Lomé.</p>
  </main>

  <!-- Footer -->
  <footer class="text-center text-gray-400 text-sm py-6 border-t border-gray-800 mt-12">
    &copy; 2025 - Jobs Tracker. Tous droits réservés.
  </footer>

</body>
</html>
